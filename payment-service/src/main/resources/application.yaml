server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:paymentsdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    username: admin
    password: admin
    addresses: amqp://localhost:5672

logging:
  level:
    web: DEBUG

rabbitmq:
  service:
    order:
      exchange-response-name: payment-response-exchange
      queue-response-name: payment-response-queue
      queue-request-name: payment-request-queue


