server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:paymentsdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  #rabbitmq:
  #  username: admin
  #  password: admin
  #  addresses: amqp://localhost:5672


  kafka:
    bootstrap-servers: localhost:9093 # Адрес и порт Kafka-брокеров, к которым будет подключаться приложение
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer # Сериализация ключа сообщений в строку
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer # Сериализация значения сообщений в JSON
    listener:
      ack-mode: manual # Режим подтверждения обработки сообщений — вручную
      observation-enabled: true # Включение наблюдения для слушателей Kafka
    template:
      observation-enabled: true # Включение наблюдения для KafkaTemplate
    consumer:
      group-id: payment-consumers # Идентификатор группы потребителей
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer # Десериализация ключа из строки
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer # Десериализация значения из JSON
      auto-offset-reset: earliest # Начинать чтение с самого раннего сообщения при отсутствии смещения
      enable-auto-commit: false # Отключение автоматического подтверждения смещений для ручного контроля
      properties:
        spring.json.use.type.headers: false # Отключение использования заголовков типа JSON
        spring.json.trusted.packages: "*" # Разрешение доверять любым пакетам при десериализации
        spring.json.value.default.type: "com.example.payment.integration.order.dto.message.OrderCreationStatusMessage" # Тип по умолчанию для десериализации JSON


logging:
  level:
    web: DEBUG



kafka:
  service:
    order:
      order-creation-status-topic: order.creation.status

