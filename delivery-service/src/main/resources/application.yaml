server:
  port: 8083

spring:
  datasource:
    url: jdbc:h2:mem:deliverydb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    web: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      deliveryService:
        registerHealthIndicator: true     # Включить мониторинг состояния цепи
        failureRateThreshold: 60
        waitDurationInOpenState: 45s
        slidingWindowSize: 15
        minimumNumberOfCalls: 8
        ignoreExceptions:
          - java.lang.RuntimeException    # Исключения, которые игнорируются при оценке ошибок