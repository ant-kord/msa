server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:ordersdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    username: admin
    password: admin
    addresses: amqp://localhost:5672

  kafka:
    bootstrap-servers: localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual
      observation-enabled: true
    template:
      observation-enabled: true
    consumer:
      group-id: order-consumers
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.use.type.headers: false
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: "com.example.order.dto.message.OrderCreationStatusMessage"

logging:
  level:
    web: DEBUG


resilience4j:
  retry:
    instances:
      paymentServiceRetry:
        maxAttempts: 3                 # Максимальное число попыток выполнения метода (включая первую)
        waitDuration: 500ms            # Время ожидания между попытками
        retryExceptions:
          - feign.FeignException       # Исключения, при которых происходит повторная попытка
        ignoreExceptions:
          - java.lang.RuntimeException # Исключения, игнорируемые для повторных попыток

  circuitbreaker:
    instances:
      orderServiceCircuitBreaker:
        registerHealthIndicator: true     # Включить мониторинг состояния цепи
        slidingWindowSize: 50             # Размер окна для оценки ошибок (сколько вызовов учитывается)
        failureRateThreshold: 50          # Процент ошибок, при котором цепь откроется
        waitDurationInOpenState: 30s      # Время, в течение которого цепь останется открытой
        permittedNumberOfCallsInHalfOpenState: 20 # Количество вызовов в полузакрытом состоянии для проверки
        minimumNumberOfCalls: 5          # Минимальное число вызовов для оценки состояния цепи
        ignoreExceptions:
          - java.lang.RuntimeException    # Исключения, которые игнорируются при оценке ошибок

      paymentServiceCircuitBreaker:
        registerHealthIndicator: true     # Включить мониторинг состояния цепи
        slidingWindowSize: 50             # Размер окна для оценки ошибок (сколько вызовов учитывается)
        failureRateThreshold: 30          # Процент ошибок, при котором цепь откроется
        waitDurationInOpenState: 30s      # Время, в течение которого цепь останется открытой
        permittedNumberOfCallsInHalfOpenState: 10 # Количество вызовов в полузакрытом состоянии для проверки
        minimumNumberOfCalls: 20         # Минимальное число вызовов для оценки состояния цепи
        recordExceptions:
          - feign.FeignException          # Исключения, которые считаются ошибками
        ignoreExceptions:
          - java.lang.RuntimeException    # Исключения, которые игнорируются при оценке ошибок

  ratelimiter:
    instances:
      paymentClientRateLimiter:
        limitForPeriod: 10      # Максимальное количество вызовов за один период (например, за 1 секунду)
        limitRefreshPeriod: 1s  # Период, за который сбрасывается счетчик лимитов (например, 1 секунда)
        timeoutDuration: 0s     # Время ожидания, если лимит достигнут; 0 означает сразу отказ, без ожидания

  bulkhead:
    instances:
      paymentClientBulkhead:
        maxConcurrentCalls: 5  # Максимальное число параллельных вызовов, разрешенных одновременно
        maxWaitDuration: 0s    # Время ожидания, если все слоты заняты; 0 — отказ сразу, без ожидания

integration:
  payment-service:
    base-url: http://localhost:8082/api/v1/payments

